# Local dev stack:
#  - tokenize-udf / reidentify-udf: the Redshift Lambda UDF handler under AWS's local Runtime
#    Interface Emulator (one container per Redshift external function, distinguished only by
#    UDF_OPERATION -- the deployment shape this mirrors in real AWS).
#  - tokenization-api: the plain REST API for every other database (Postgres, MySQL, Snowflake
#    External Functions, BigQuery Remote Functions, application code) -- see README.md.
#  - postgres: local Postgres standing in for a real database's tables so there's data to
#    round-trip against.
#  - sql-interception-proxy: transparent masking demo -- runs an arbitrary SELECT against
#    postgres and masks known-sensitive columns in the result, no tokenize()/mask_*() call needed.
#
# NOTE: Postgres itself cannot invoke a Lambda (CREATE EXTERNAL FUNCTION ... LAMBDA is a
# Redshift-only feature) -- it's here purely to hold sample plaintext data. scripts/test-udf.sh
# and scripts/test-http-api.sh read rows from it and call the respective endpoints directly to
# exercise each entry point's wire contract. See README.md for the real Redshift DDL and other
# databases' integration patterns.
#
# Default KEY_SOURCE=PLAINTEXT below is for local dev only, so this stack runs without AWS
# credentials. Set KEY_SOURCE=KMS (and mount ~/.aws + set AWS_REGION) to test the envelope
# encryption path against a real KMS key -- see README.md.
# CRYPTO_PROVIDER/CIPHER_ALGORITHM default to the same built-ins TokenizationAlgorithm defaults
# to (BCFIPS/AES-CBC-CTS); override in .env to try e.g. CRYPTO_PROVIDER=SunJCE (works for
# short/PKCS5Padding values -- see the provider portability note in README.md).
services:
  tokenize-udf:
    build:
      context: .
      dockerfile: Dockerfile.lambda
    environment:
      UDF_OPERATION: TOKENIZE
      KEY_SOURCE: PLAINTEXT
      # Deliberately a soft default (not `:?`/required): compose interpolates every service's
      # environment block before starting *any* of them, so a hard requirement here would break
      # `docker compose up -d --build tokenization-api` (e.g. the demo UI's "Apply Configuration"
      # switching tokenization-api to KEY_SOURCE=KMS, which blanks this var) even though these
      # two services weren't being started at all. Missing it here now fails inside the
      # container instead (DataEncryptionKeySource's own requireEnv check), same tradeoff
      # tokenization-api below already made.
      DATA_ENCRYPTION_KEY_BASE64: ${DATA_ENCRYPTION_KEY_BASE64:-}
      CRYPTO_PROVIDER: ${CRYPTO_PROVIDER:-BCFIPS}
      CIPHER_ALGORITHM: ${CIPHER_ALGORITHM:-AES-CBC-CTS}
    ports:
      - "9001:8080"

  reidentify-udf:
    build:
      context: .
      dockerfile: Dockerfile.lambda
    environment:
      UDF_OPERATION: REIDENTIFY
      KEY_SOURCE: PLAINTEXT
      # Deliberately a soft default (not `:?`/required): compose interpolates every service's
      # environment block before starting *any* of them, so a hard requirement here would break
      # `docker compose up -d --build tokenization-api` (e.g. the demo UI's "Apply Configuration"
      # switching tokenization-api to KEY_SOURCE=KMS, which blanks this var) even though these
      # two services weren't being started at all. Missing it here now fails inside the
      # container instead (DataEncryptionKeySource's own requireEnv check), same tradeoff
      # tokenization-api below already made.
      DATA_ENCRYPTION_KEY_BASE64: ${DATA_ENCRYPTION_KEY_BASE64:-}
      CRYPTO_PROVIDER: ${CRYPTO_PROVIDER:-BCFIPS}
      CIPHER_ALGORITHM: ${CIPHER_ALGORITHM:-AES-CBC-CTS}
    ports:
      - "9002:8080"

  tokenization-api:
    build:
      context: .
      dockerfile: Dockerfile.http-server
    environment:
      # Unlike tokenize-udf/reidentify-udf above (pinned to KEY_SOURCE=PLAINTEXT for the
      # local-only Lambda RIE path), this service reads KEY_SOURCE from .env so the demo UI
      # (demo/server.py) can switch it between PLAINTEXT and KMS and rebuild just this
      # container.
      KEY_SOURCE: ${KEY_SOURCE:-PLAINTEXT}
      DATA_ENCRYPTION_KEY_BASE64: ${DATA_ENCRYPTION_KEY_BASE64:-}
      DATA_ENCRYPTION_KEY_CIPHERTEXT_BASE64: ${DATA_ENCRYPTION_KEY_CIPHERTEXT_BASE64:-}
      KMS_KEY_ID: ${KMS_KEY_ID:-}
      AWS_REGION: ${AWS_REGION:-}
      # Alternative to the ~/.aws mount below: static/temporary credentials via the AWS SDK's
      # default env-var credential provider (checked before the mounted ~/.aws profile). Leave
      # unset to use the mount instead -- AWS_SESSION_TOKEN only applies to temporary/STS
      # credentials (assumed-role, SSO), not a long-lived IAM user's static keys.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      CRYPTO_PROVIDER: ${CRYPTO_PROVIDER:-BCFIPS}
      CIPHER_ALGORITHM: ${CIPHER_ALGORITHM:-AES-CBC-CTS}
      PORT: "4051"
    # Descriptive only (labels aren't read by the container or the app) -- maps each SQL UDF this
    # service backs to the one-way scheme ("algorithm framework") it's permanently fixed to and
    # the Delphix Continuous Compliance engine algorithm class that runs the same scheme inside
    # the engine (see FixedSchemeMaskingAlgorithm). Keep in sync with docker/postgres/udf.sql and
    # demo/index.html's ALGORITHM_MAPPING if any of these ever change.
    labels:
      com.delphix.dynamicmasking.mapping.mask_fullname.scheme: "FULL-NAME-MASK"
      com.delphix.dynamicmasking.mapping.mask_fullname.algorithm: "FullNameMaskingAlgorithm"
      com.delphix.dynamicmasking.mapping.mask_creditcard.scheme: "CREDIT-CARD-MASK"
      com.delphix.dynamicmasking.mapping.mask_creditcard.algorithm: "CreditCardMaskingAlgorithm"
      com.delphix.dynamicmasking.mapping.mask_email.scheme: "EMAIL-MASK"
      com.delphix.dynamicmasking.mapping.mask_email.algorithm: "EmailMaskingAlgorithm"
      com.delphix.dynamicmasking.mapping.mask_firstname.scheme: "FIRST-NAME-LOOKUP"
      com.delphix.dynamicmasking.mapping.mask_firstname.algorithm: "FirstNameMaskingAlgorithm"
      com.delphix.dynamicmasking.mapping.mask_lastname.scheme: "LAST-NAME-LOOKUP"
      com.delphix.dynamicmasking.mapping.mask_lastname.algorithm: "LastNameMaskingAlgorithm"
      com.delphix.dynamicmasking.mapping.mask_dateshift.scheme: "DATE-SHIFT"
      com.delphix.dynamicmasking.mapping.mask_dateshift.algorithm: "DateShiftMaskingAlgorithm"
      com.delphix.dynamicmasking.mapping.mask_segmentmapping.scheme: "SEGMENT-MAPPING"
      com.delphix.dynamicmasking.mapping.mask_segmentmapping.algorithm: "SegmentMappingMaskingAlgorithm"
      com.delphix.dynamicmasking.mapping.tokenize.scheme: "AES-CBC-CTS (default; also AES-GCM, AES-ECB)"
      com.delphix.dynamicmasking.mapping.tokenize.algorithm: "TokenizationAlgorithm"
    volumes:
      # Read-only mount so KEY_SOURCE=KMS can resolve real AWS credentials from the host;
      # unused (and harmless if absent) under KEY_SOURCE=PLAINTEXT or when the AWS_* env vars
      # above are set instead.
      - ${HOME}/.aws:/root/.aws:ro
    ports:
      - "4051:4051"

  postgres:
    build:
      context: ./docker/postgres
    environment:
      POSTGRES_USER: dynamicmasking
      POSTGRES_PASSWORD: dynamicmasking
      POSTGRES_DB: dynamicmasking
    depends_on:
      - tokenization-api
    ports:
      - "5432:5432"
    volumes:
      # init.sql/udf.sql are baked into the image itself now (see docker/postgres/Dockerfile),
      # not bind-mounted -- rebuild this service after editing either file.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dynamicmasking"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Transparent masking demo: runs an arbitrary SELECT against the sample Postgres above and
  # masks known-sensitive columns (full_name/email/credit_card) in the result -- see README.md's
  # "SQL Interception" section. Distinct from tokenization-api's udf.sql-backed SQL functions,
  # which require calling tokenize()/mask_*() explicitly per query.
  sql-interception-proxy:
    build:
      context: .
      dockerfile: Dockerfile.sqlproxy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: dynamicmasking
      DB_USER: dynamicmasking
      DB_PASSWORD: dynamicmasking
      # One-way masking only (BatchMasker/OneWayMaskingScheme) -- no CRYPTO_PROVIDER/CIPHER_ALGORITHM
      # needed, but the DEK is still resolved via DataEncryptionKeySource, same as tokenization-api.
      KEY_SOURCE: ${KEY_SOURCE:-PLAINTEXT}
      DATA_ENCRYPTION_KEY_BASE64: ${DATA_ENCRYPTION_KEY_BASE64:-}
      DATA_ENCRYPTION_KEY_CIPHERTEXT_BASE64: ${DATA_ENCRYPTION_KEY_CIPHERTEXT_BASE64:-}
      KMS_KEY_ID: ${KMS_KEY_ID:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      PORT: "4053"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4053:4053"

  # Single-node Kafka broker (KRaft mode, no ZooKeeper needed) for the "Streaming" demo -- an
  # off-the-shelf image, no custom Dockerfile. Auto-topic-creation is left on (the default), a
  # demo-only convenience, not a real-deployment recommendation.
  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT (19092) is the internal, container-to-container listener kafka-masking-bridge
      # connects to; PLAINTEXT_HOST (9092) is for inspecting the broker from the host machine.
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:19093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:19093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"

  # Kafka masking bridge: consumes the input topic, tokenizes SENSITIVE_FIELDS, produces to the
  # output topic -- see README.md's "Streaming" section.
  kafka-masking-bridge:
    build:
      context: .
      dockerfile: Dockerfile.kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_INPUT_TOPIC: dynamicmasking.demo.input
      KAFKA_OUTPUT_TOPIC: dynamicmasking.demo.output
      SENSITIVE_FIELDS: full_name,email,credit_card
      KEY_SOURCE: ${KEY_SOURCE:-PLAINTEXT}
      DATA_ENCRYPTION_KEY_BASE64: ${DATA_ENCRYPTION_KEY_BASE64:-}
      DATA_ENCRYPTION_KEY_CIPHERTEXT_BASE64: ${DATA_ENCRYPTION_KEY_CIPHERTEXT_BASE64:-}
      KMS_KEY_ID: ${KMS_KEY_ID:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      CRYPTO_PROVIDER: ${CRYPTO_PROVIDER:-BCFIPS}
      CIPHER_ALGORITHM: ${CIPHER_ALGORITHM:-AES-CBC-CTS}
      PORT: "4052"
    depends_on:
      - kafka
    ports:
      - "4052:4052"

  # Real Kafka topic browser (internal only -- see kafka-ui-proxy below) for inspecting
  # dynamicmasking.demo.input/.output directly, independent of the demo UI's own Live Messages
  # view. See README.md's "Streaming" section.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    depends_on:
      - kafka

  # nginx in front of kafka-ui, stripping its baked-in GitHub/Discord footer links (see
  # docker/kafka-ui-proxy.conf -- kafka-ui itself has no setting to disable them).
  kafka-ui-proxy:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./docker/kafka-ui-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kafka-ui

  # Synthetic EDI270 event source -- a source topic only (no masking), for the Streaming
  # environment's Rule Sets tab to demo the algorithm-mapping UI against real JSON. See
  # edi270_producer.py and README.md's "Streaming" section.
  edi270-producer:
    build:
      context: .
      dockerfile: Dockerfile.edi270-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      TOPIC: EDI270
      INTERVAL_SECONDS: "2"
    depends_on:
      - kafka

volumes:
  pgdata:
