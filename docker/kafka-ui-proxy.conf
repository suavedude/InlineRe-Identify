# Reverse proxy in front of kafka-ui, stripping its baked-in GitHub/Discord footer links (it has
# no setting to disable these, since they're compiled into its frontend) -- same approach as
# https://github.com/provectus/kafka-ui deployments elsewhere in Delphix demo projects.
server {
    listen 80;

    location / {
        proxy_pass http://kafka-ui:8080;
        proxy_set_header Accept-Encoding "";

        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</body>' "<script>(function(){function hideSocialLinks(){document.querySelectorAll('a').forEach(function(link){var href = link.getAttribute('href') || '';if(href.indexOf('github.com/provectus') > -1 || href.indexOf('discord.com/invite') > -1){var el = link.closest('li') || link;el.style.display = 'none';}});}var observer = new MutationObserver(hideSocialLinks);observer.observe(document.documentElement, {childList: true, subtree: true});hideSocialLinks();})();</script></body>";
    }
}
